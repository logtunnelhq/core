services:
  logtunnel-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: logtunnel-api:latest
    container_name: logtunnel-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production

      # Pick any provider — Anthropic, OpenAI, or Ollama.
      # See README.md for the full provider table.
      LLM__PROVIDER: Anthropic
      LLM__MODEL: claude-sonnet-4-20250514
      LLM__APIKEY: ""    # set me before booting
      LLM__BASEURL: ""   # optional — leave blank for the provider default

      # Where POST /configure writes .logtunnel.json inside the container.
      # Mount a host volume below if you want it to survive restarts.
      LogTunnel__Config__OutputDirectory: /var/logtunnel

    # Uncomment to persist .logtunnel.json across container restarts:
    # volumes:
    #   - ./.logtunnel-data:/var/logtunnel

    restart: unless-stopped
